# CarbonFox
#
# UI / Environment
#   Background: #161616  Foreground: #f2f4f8
#   Selection bg: #2a2a2a  Selection fg / Cursor: #f2f4f8
#
# Normal (0-7)                Bright (8-15)
#   0 Black:   #282828        8 Bright Black:   #484848
#   1 Red:     #ee5396        9 Bright Red:     #f16da6
#   2 Green:   #25be6a       10 Bright Green:   #46c880
#   3 Yellow:  #08bdba       11 Bright Yellow:  #2dc7c4
#   4 Blue:    #78a9ff       12 Bright Blue:    #8cb6ff
#   5 Magenta: #be95ff       13 Bright Magenta: #c8a5ff
#   6 Cyan:    #33b1ff       14 Bright Cyan:    #52bdff
#   7 White:   #dfdfe0       15 Bright White:   #e4e4e5
#
# Extended
#  16: #3ddbd9

set -g status-style "bg=#161616,fg=#f2f4f8"
set -g pane-border-style "fg=#2a2a2a"
set -g pane-active-border-style "fg=#78a9ff"
set -g window-status-current-style "bg=#2a2a2a,fg=#dfdfe0,bold"
set -g window-status-style "fg=#6e6e6e"
