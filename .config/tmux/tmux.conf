# ==============================================================================
# [ GENERAL SETTINGS ]
# ==============================================================================

# Enable RGB colour if running in xterm(1)
set-option -sa terminal-overrides ",xterm*:Tc"

# Change prefix from Ctrl-b to Ctrl-a (easier to reach)
set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

# Start indexing at 1 (instead of 0) to match keyboard layout
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on   # Automatically renumber windows when one is closed

# Quality of Life
set -g mouse on              # Enable mouse support
set -g focus-events on       # Let apps like Vim know when they have focus
set-window-option -g mode-keys vi # Use Vim motions in copy mode

# ==============================================================================
# [ NVIM TO TMUX ]
# ==============================================================================
bind-key C-a run-shell "\
  CURRENT=\$(tmux display-message -p '#{window_name}'); \
  if [ \"\$CURRENT\" = \"claude\" ]; then \
    tmux select-window -t :code; \
  else \
    tmux select-window -t :claude; \
  fi \
"

# ==============================================================================
# [ KEY BINDINGS ]
# ==============================================================================

# Reload config file
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display "Config Reloaded!"

# Split Panes using | and -
unbind %
bind | split-window -h
unbind '"'
bind - split-window -v

# Pane Resizing (-r allows repeating the key without re-pressing prefix)
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5
bind -r m resize-pane -Z    # Maximize/Toggle pane zoom

# Copy Mode (Vim style)
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection
unbind -T copy-mode-vi MouseDragEnd1Pane # Don't exit copy mode when dragging mouse

# ==============================================================================
# [ UI & THEME ] - Nightfox Palette
# ==============================================================================

# Statusline Position/Justification
set -g status-position bottom
set -g status-justify right    # Aligned right to accommodate tpipeline

# Window Status Format
set -g window-status-separator ""
set -g window-status-format " #I #W "
set -g window-status-current-format " #I #W "

# Tpipeline Support (Letting the Neovim plugin handle status content)
set -g status-left ""
set -g status-right ""
set -g status-left-length 0
set -g status-right-length 0

# Pane Border Overlays (Optional/Hidden)
set -g pane-border-status off
set -g pane-border-format " [ ###P #T ] "

# Theme (swap by changing the source-file path)
source-file ~/.config/tmux/themes/carbonfox.conf

# ==============================================================================
# [ DEV CONTAINER ] - Special styles for easy identification
# ==============================================================================

if-shell '[ -f /.dockerenv ] || [ -n "$DEVPOD" ]' \
  'set -g status-bg "#be95ff"; set -g status-fg colour232' \
  'set -g status-bg default'

if-shell '[ -f /.dockerenv ] || [ -n "$DEVPOD" ]' \
  'set -g status-right "#[fg=colour232,bg=#be95ff,bold] ⬡ CONTAINER #[default] %H:%M"' \
  'set -g status-right " %H:%M"'

# ==============================================================================
# [ PLUGINS ]
# ==============================================================================

# Plugin Manager
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins'
set -g @plugin 'tmux-plugins/tpm'

# Functional Plugins
set -g @plugin 'christoomey/vim-tmux-navigator'  # Seamless nav between tmux & vim
set -g @plugin 'tmux-plugins/tmux-resurrect'     # Persist sessions after reboot
set -g @plugin 'tmux-plugins/tmux-continuum'     # Auto-save sessions every 15m
set -g @plugin 'tmux-plugins/tmux-yank'          # System clipboard integration

# Plugin Configs
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# Initialize TMUX plugin manager (KEEP THIS AT THE VERY BOTTOM)
run '~/.config/tmux/plugins/tpm/tpm'
