# Minimal starship config — fast, two-line, container-friendly.
add_newline = false
command_timeout = 1000

format = """
$directory\
$git_branch\
$git_status\
$nodejs\
$python\
$rust\
$golang\
$docker_context\
$character"""

[character]
success_symbol = "[›](bold green)"
error_symbol   = "[›](bold red)"

[directory]
truncation_length = 3
truncation_symbol = "…/"
style = "bold cyan"

[git_branch]
symbol = " "
style  = "bold purple"

[git_status]
style = "bold yellow"

[nodejs]
format = "via [⬢ $version](bold green) "

[python]
format = "via [🐍 $version](bold yellow) "
